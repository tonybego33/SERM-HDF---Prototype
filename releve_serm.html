<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no">
<meta name="theme-color" content="#C8102E">
<title>Relevé SERM HDF</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,400;9..144,500;9..144,600;9..144,700&family=Public+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
:root {
  --red: #C8102E;
  --red-dark: #9E0B24;
  --ink: #1A1A1A;
  --ink-soft: #3D3D3D;
  --paper: #F5F2EB;
  --paper-light: #FAF8F3;
  --taupe: #8B8680;
  --border: #D9D3C4;
  --green: #1D5E3A;
  --amber: #C77800;
  --red-soft: #E8475B;
  --white: #FFFFFF;
  --shadow: 0 1px 2px rgba(26,26,26,0.04), 0 4px 12px rgba(26,26,26,0.06);
}
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
html, body { height: 100%; }
body {
  font-family: 'Public Sans', system-ui, sans-serif;
  background: var(--paper);
  color: var(--ink);
  font-size: 15px;
  line-height: 1.45;
  -webkit-font-smoothing: antialiased;
  overscroll-behavior-y: contain;
}
h1, h2, h3, .serif { font-family: 'Fraunces', Georgia, serif; font-weight: 500; letter-spacing: -0.01em; }
button { font: inherit; color: inherit; background: none; border: none; cursor: pointer; }

/* ------- APP SHELL ------- */
.app { max-width: 560px; margin: 0 auto; min-height: 100vh; background: var(--paper-light); position: relative; display: flex; flex-direction: column; }

/* ------- HEADER ------- */
.topbar {
  background: var(--ink); color: var(--paper);
  padding: 12px 18px; display: flex; justify-content: space-between; align-items: center;
  position: sticky; top: 0; z-index: 50;
  box-shadow: 0 2px 8px rgba(0,0,0,0.12);
}
.topbar-left { display: flex; align-items: center; gap: 10px; }
.logo {
  width: 28px; height: 28px; background: var(--red);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Fraunces', serif; font-weight: 700; font-size: 16px;
  color: var(--paper); border-radius: 2px;
}
.topbar-title {
  font-family: 'Fraunces', serif; font-weight: 500; font-size: 15px;
  letter-spacing: 0.02em;
}
.topbar-title span { opacity: 0.6; font-weight: 400; }
.topbar-action {
  color: var(--paper); font-size: 14px; padding: 6px 10px;
  border-radius: 3px; border: 1px solid rgba(245,242,235,0.2);
}
.topbar-action:active { background: rgba(245,242,235,0.1); }

/* ------- HOME ------- */
.home { padding: 24px 20px 120px; flex: 1; }
.home-kicker {
  font-family: 'Fraunces', serif; font-style: italic;
  color: var(--red); font-size: 13px; letter-spacing: 0.08em; text-transform: uppercase;
  margin-bottom: 6px; font-weight: 500;
}
.home-title {
  font-size: 32px; font-weight: 500; line-height: 1.1;
  margin-bottom: 20px;
}
.home-title em { font-style: italic; color: var(--red); font-weight: 400; }
.home-lead {
  color: var(--ink-soft); font-size: 15px; line-height: 1.5;
  margin-bottom: 28px; max-width: 44ch;
}
.home-lead strong { color: var(--ink); font-weight: 600; }

.section-heading {
  font-family: 'Fraunces', serif; font-size: 13px; font-weight: 500;
  text-transform: uppercase; letter-spacing: 0.1em;
  color: var(--taupe); margin: 24px 0 12px;
  display: flex; align-items: baseline; justify-content: space-between;
}
.section-heading::after {
  content: ''; flex: 1; height: 1px; background: var(--border); margin-left: 12px;
}
.section-heading-count { color: var(--ink-soft); font-size: 12px; letter-spacing: 0; }

.btn-primary {
  display: block; width: 100%; padding: 16px 20px;
  background: var(--red); color: var(--paper-light);
  font-weight: 600; font-size: 16px; letter-spacing: 0.01em;
  border-radius: 3px; text-align: center;
  box-shadow: var(--shadow);
  transition: background 0.15s, transform 0.1s;
}
.btn-primary:active { background: var(--red-dark); transform: translateY(1px); }
.btn-secondary {
  display: block; width: 100%; padding: 14px 18px;
  background: var(--white); color: var(--ink);
  border: 1px solid var(--border);
  font-weight: 500; font-size: 15px;
  border-radius: 3px; text-align: center;
  margin-top: 10px;
}
.btn-secondary:active { background: var(--paper); }

/* ------- VISITES LIST ------- */
.visites-list { display: flex; flex-direction: column; gap: 8px; }
.visite-card {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 3px; padding: 14px 16px;
  display: flex; justify-content: space-between; align-items: center;
  gap: 12px; cursor: pointer;
  transition: border-color 0.15s;
}
.visite-card:active { border-color: var(--red); }
.visite-card-info h4 { font-weight: 600; font-size: 15px; margin-bottom: 2px; }
.visite-card-meta { font-size: 12px; color: var(--taupe); display: flex; gap: 10px; }
.visite-card-progress {
  font-family: 'Fraunces', serif; font-size: 20px; font-weight: 500;
  color: var(--red); font-variant-numeric: tabular-nums;
}
.visite-card-progress .pct { font-size: 14px; opacity: 0.7; margin-left: 1px; }
.empty { color: var(--taupe); font-size: 14px; padding: 12px 0; font-style: italic; }

/* ------- GARE PICKER ------- */
.gare-search {
  background: var(--white); border: 1px solid var(--border);
  border-radius: 3px; padding: 14px 16px; font-size: 16px;
  font-family: inherit; width: 100%; margin-bottom: 12px;
}
.gare-search:focus { outline: none; border-color: var(--red); }
.gare-list { max-height: 60vh; overflow-y: auto; border: 1px solid var(--border); border-radius: 3px; background: var(--white); }
.gare-item {
  padding: 12px 16px; border-bottom: 1px solid var(--border);
  display: flex; justify-content: space-between; align-items: baseline;
  cursor: pointer;
}
.gare-item:last-child { border-bottom: none; }
.gare-item:active { background: var(--paper); }
.gare-item-name { font-weight: 500; }
.gare-item-meta { font-size: 11px; color: var(--taupe); letter-spacing: 0.04em; text-transform: uppercase; }
.gare-done { position: relative; }
.gare-done::after {
  content: '✓'; position: absolute; right: 16px; top: 50%; transform: translateY(-50%);
  color: var(--green); font-weight: bold;
}
.gare-done .gare-item-name { padding-right: 20px; }

/* ------- VISITE FORM ------- */
.form-header {
  padding: 20px 20px 14px; background: var(--paper-light);
  border-bottom: 1px solid var(--border);
  position: sticky; top: 54px; z-index: 40;
}
.form-header-row {
  display: flex; justify-content: space-between; align-items: baseline; gap: 8px;
}
.form-gare-name {
  font-family: 'Fraunces', serif; font-size: 24px; font-weight: 500; line-height: 1.1;
}
.form-gare-meta { font-size: 11px; color: var(--taupe); letter-spacing: 0.05em; text-transform: uppercase; margin-top: 4px; }
.progress-ring {
  width: 42px; height: 42px; position: relative; flex-shrink: 0;
}
.progress-ring svg { transform: rotate(-90deg); }
.progress-ring-bg { fill: none; stroke: var(--border); stroke-width: 4; }
.progress-ring-fg { fill: none; stroke: var(--red); stroke-width: 4; stroke-linecap: round; transition: stroke-dashoffset 0.4s ease; }
.progress-ring-label {
  position: absolute; top: 50%; left: 50%; transform: translate(-50%,-50%);
  font-size: 11px; font-weight: 600; font-variant-numeric: tabular-nums; color: var(--ink);
}

/* Section accordion */
.section {
  border-bottom: 1px solid var(--border);
  background: var(--paper-light);
}
.section-header {
  display: flex; align-items: center; gap: 14px;
  padding: 16px 20px; width: 100%; text-align: left;
  transition: background 0.15s;
}
.section-header:active { background: var(--paper); }
.section-num {
  font-family: 'Fraunces', serif; font-weight: 400; font-size: 28px;
  color: var(--red); font-style: italic; line-height: 1;
  width: 30px; flex-shrink: 0;
}
.section-title {
  flex: 1; font-family: 'Fraunces', serif; font-size: 18px; font-weight: 500;
}
.section-status {
  font-size: 11px; font-weight: 600; letter-spacing: 0.06em; text-transform: uppercase;
  color: var(--taupe); font-variant-numeric: tabular-nums;
}
.section-status.done { color: var(--green); }
.section-chevron { color: var(--taupe); transition: transform 0.2s; font-size: 18px; }
.section.open .section-chevron { transform: rotate(90deg); }

.section-body {
  display: none; padding: 4px 20px 20px; background: var(--white);
  border-top: 1px solid var(--border);
}
.section.open .section-body { display: block; }

/* Criterion */
.criterion { padding: 14px 0; border-bottom: 1px solid var(--paper); }
.criterion:last-child { border-bottom: none; }
.criterion-label {
  font-weight: 500; font-size: 14px; line-height: 1.35; margin-bottom: 10px;
  display: flex; gap: 6px; align-items: baseline;
}
.criterion-label .req { color: var(--red); font-size: 10px; margin-top: -2px; }
.criterion-help { font-size: 12px; color: var(--taupe); margin-top: 2px; margin-bottom: 10px; line-height: 1.4; }

.rating { display: grid; grid-template-columns: repeat(3, 1fr); gap: 6px; }
.rating-btn {
  padding: 12px 6px; border: 1.5px solid var(--border);
  background: var(--white); border-radius: 3px;
  font-size: 13px; font-weight: 500; color: var(--ink-soft);
  transition: all 0.15s; text-align: center;
  display: flex; flex-direction: column; align-items: center; justify-content: center; gap: 2px;
  min-height: 56px;
}
.rating-btn .dot {
  width: 8px; height: 8px; border-radius: 50%; background: var(--border);
  margin-bottom: 2px; transition: background 0.15s;
}
.rating-btn[data-val="0"].active { border-color: var(--red-soft); background: #FDF1F3; color: var(--red-dark); }
.rating-btn[data-val="0"].active .dot { background: var(--red-soft); }
.rating-btn[data-val="0.5"].active { border-color: var(--amber); background: #FDF6EB; color: var(--amber); }
.rating-btn[data-val="0.5"].active .dot { background: var(--amber); }
.rating-btn[data-val="1"].active { border-color: var(--green); background: #ECF4EF; color: var(--green); }
.rating-btn[data-val="1"].active .dot { background: var(--green); }
.rating-btn[data-val="na"].active { border-color: var(--taupe); background: var(--paper); color: var(--ink-soft); }
.rating-btn[data-val="na"].active .dot { background: var(--taupe); }
.rating-btn:active { transform: scale(0.97); }

/* 2-column variant */
.rating.cols-2 { grid-template-columns: repeat(2, 1fr); }
.rating.cols-4 { grid-template-columns: repeat(4, 1fr); }

.criterion-extras {
  margin-top: 10px; display: none;
}
.criterion.has-note .criterion-extras, .criterion.force-extras .criterion-extras { display: block; }
.extras-toggle {
  margin-top: 8px; font-size: 12px; color: var(--taupe); font-weight: 500;
  letter-spacing: 0.02em;
}
.extras-toggle:active { color: var(--red); }
.criterion-note {
  width: 100%; padding: 10px 12px; font-family: inherit; font-size: 14px;
  border: 1px solid var(--border); border-radius: 3px;
  background: var(--paper-light); resize: vertical; min-height: 60px;
}
.criterion-note:focus { outline: none; border-color: var(--red); background: var(--white); }

.photo-input-wrap {
  display: flex; gap: 8px; margin-top: 8px;
}
.photo-btn {
  padding: 10px 12px; border: 1px dashed var(--border); border-radius: 3px;
  font-size: 12px; color: var(--taupe); text-align: center; flex: 1;
  display: flex; align-items: center; justify-content: center; gap: 6px;
}
.photo-btn:active { border-color: var(--red); color: var(--red); }
.photo-count { font-weight: 600; color: var(--red); }
.photos-preview { display: flex; gap: 6px; margin-top: 8px; overflow-x: auto; padding-bottom: 4px; }
.photo-thumb { width: 64px; height: 64px; border-radius: 3px; object-fit: cover; flex-shrink: 0; border: 1px solid var(--border); }

/* Bottom Action Bar */
.bottom-bar {
  position: sticky; bottom: 0; background: var(--white);
  border-top: 1px solid var(--border); padding: 12px 16px;
  display: flex; gap: 10px; z-index: 45;
  box-shadow: 0 -2px 8px rgba(0,0,0,0.04);
}
.bottom-bar button { flex: 1; padding: 12px; font-weight: 600; font-size: 14px; border-radius: 3px; }
.bar-save { background: var(--ink); color: var(--paper); }
.bar-save:active { background: #000; }
.bar-export { background: var(--red); color: var(--white); }
.bar-export:active { background: var(--red-dark); }

/* General info card */
.info-card {
  background: var(--white); border: 1px solid var(--border); border-radius: 3px;
  padding: 16px 16px 8px; margin: 16px 20px;
}
.info-field { margin-bottom: 12px; }
.info-label {
  display: block; font-size: 11px; font-weight: 600; letter-spacing: 0.08em;
  text-transform: uppercase; color: var(--taupe); margin-bottom: 4px;
}
.info-input {
  width: 100%; padding: 10px 12px; font-family: inherit; font-size: 15px;
  border: 1px solid var(--border); border-radius: 3px; background: var(--paper-light);
}
.info-input:focus { outline: none; border-color: var(--red); background: var(--white); }
.info-row { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }

/* Toast */
.toast {
  position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--ink); color: var(--paper); padding: 10px 18px;
  border-radius: 3px; font-size: 13px; font-weight: 500;
  opacity: 0; transition: all 0.25s; z-index: 100; pointer-events: none;
  box-shadow: var(--shadow); max-width: 80vw;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(--green); }
.toast.error { background: var(--red); }

/* Modal */
.modal-overlay {
  position: fixed; inset: 0; background: rgba(26,26,26,0.5);
  display: none; align-items: flex-end; justify-content: center; z-index: 200;
  animation: fade 0.2s;
}
.modal-overlay.show { display: flex; }
.modal {
  background: var(--paper-light); width: 100%; max-width: 560px;
  border-radius: 8px 8px 0 0; padding: 20px;
  max-height: 80vh; overflow-y: auto;
  animation: slideup 0.25s;
}
.modal h3 { font-size: 20px; margin-bottom: 14px; }
.modal p { font-size: 14px; color: var(--ink-soft); margin-bottom: 14px; }
@keyframes fade { from { opacity: 0; } to { opacity: 1; } }
@keyframes slideup { from { transform: translateY(100%); } to { transform: translateY(0); } }

/* Decorative accents */
.accent-line {
  height: 3px; width: 40px; background: var(--red); margin-top: 2px; margin-bottom: 16px;
}

/* Scrollbar styling */
::-webkit-scrollbar { width: 8px; height: 8px; }
::-webkit-scrollbar-track { background: var(--paper); }
::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* Hide scroll on home */
.home::-webkit-scrollbar { display: none; }

@media (min-width: 600px) {
  .app { box-shadow: var(--shadow); min-height: 100vh; }
}
</style>
</head>

</div>
<div class="toast" id="toast"></div>
<div class="modal-overlay" id="modal"><div class="modal" id="modal-content"></div></div>

/* ==========================================================================
   STORAGE : window.storage (artifact) avec fallback localStorage (standalone)
   ========================================================================== */
const Store = {
  async set(k, v) {
    const val = typeof v === 'string' ? v : JSON.stringify(v);
    try { if (window.storage) { await window.storage.set(k, val); return; } } catch(e) {}
    try { localStorage.setItem(k, val); } catch(e) { console.warn('Storage failed', e); }
  },
  async get(k) {
    try {
      if (window.storage) {
        const r = await window.storage.get(k);
        return r ? r.value : null;
      }
    } catch(e) {}
    try { return localStorage.getItem(k); } catch(e) { return null; }
  },
  async list(prefix) {
    try {
      if (window.storage) {
        const r = await window.storage.list(prefix);
        return (r && r.keys) ? r.keys : [];
      }
    } catch(e) {}
    try {
      const out = [];
      for (let i=0; i<localStorage.length; i++) {
        const k = localStorage.key(i);
        if (k && (!prefix || k.startsWith(prefix))) out.push(k);
      }
      return out;
    } catch(e) { return []; }
  },
  async delete(k) {
    try { if (window.storage) { await window.storage.delete(k); return; } } catch(e) {}
    try { localStorage.removeItem(k); } catch(e) {}
  }
};

const KEY_PREFIX = 'serm:v1:';

/* ==========================================================================
   STATE
   ========================================================================== */
let state = {
  route: 'home',  // 'home' | 'picker' | 'form'
  currentVisite: null, // { gare, data: {critId: {val, note, photoCount}}, meta: {...} }
  visitesList: [], // résumé pour home
  searchQuery: ''
};

/* ==========================================================================
   HELPERS
   ========================================================================== */
function toast(msg, type='') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast show ' + type;
  setTimeout(() => t.className = 'toast ' + type, 2200);
}

function countCriteria() {
  let n = 0;
  SECTIONS.forEach(s => {
    if (s.criteria) n += s.criteria.filter(c => c.scale !== 'text' && c.scale !== 'number').length;
  });
  return n;
}
const TOTAL_CRITERIA = countCriteria();

function countFilled(data) {
  if (!data) return 0;
  let n = 0;
  SECTIONS.forEach(s => {
    if (!s.criteria) return;
    s.criteria.forEach(c => {
      if (c.scale === 'text' || c.scale === 'number') return;
      if (data[c.id] && data[c.id].val !== undefined && data[c.id].val !== null && data[c.id].val !== '') n++;
    });
  });
  return n;
}

function progressPct(data) {
  return Math.round(countFilled(data) / TOTAL_CRITERIA * 100);
}

function today() {
  const d = new Date();
  return d.toISOString().slice(0,10);
}

function formatDateFR(iso) {
  if (!iso) return '—';
  const [y,m,d] = iso.split('-');
  return `${d}/${m}/${y}`;
}

/* ==========================================================================
   RENDER : HOME
   ========================================================================== */
async function renderHome() {
  state.route = 'home';
  const keys = await Store.list(KEY_PREFIX);
  const visites = [];
  for (const k of keys) {
    const raw = await Store.get(k);
    if (raw) {
      try {
        const v = JSON.parse(raw);
        visites.push({ key: k, ...v });
      } catch(e) {}
    }
  }
  visites.sort((a,b) => (b.meta?.updated || '').localeCompare(a.meta?.updated || ''));
  state.visitesList = visites;

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar">
      <div class="topbar-left">
        <div class="logo">R</div>
        <div class="topbar-title">Relevé <span>SERM HDF</span></div>

      <div class="visites-list">
        ${visites.length === 0 ? '<p class="empty">Aucune visite enregistrée. Démarre avec le bouton ci-dessus.</p>' :
          visites.map(v => {

/* ==========================================================================
   RENDER : GARE PICKER
   ========================================================================== */
async function renderPicker() {
  state.route = 'picker';
  const existingKeys = await Store.list(KEY_PREFIX);
  const existingNames = new Set(existingKeys.map(k => k.replace(KEY_PREFIX, '')));

  const app = document.getElementById('app');
  app.innerHTML = `
    <div class="topbar">
      <div class="topbar-left">
        <button class="topbar-action" onclick="renderHome()" style="border:none;padding:6px 8px;">← Retour</button>
      </div>
      <div class="topbar-title">Choisir une gare</div>
      <div style="width:60px;"></div>
    </div>
    <div class="home">
      <input type="search" class="gare-search" id="gare-search"
             placeholder="Rechercher une gare…" autocomplete="off" oninput="filterGares()">
      <div class="gare-list" id="gare-list"></div>
    </div>
  `;
  state._existingNames = existingNames;
  filterGares();
  document.getElementById('gare-search').focus();
}

function filterGares() {
  const q = document.getElementById('gare-search').value.trim().toLowerCase();
  const filtered = GARES.filter(g =>
    g.nom && g.nom.toLowerCase().includes(q)
  );
  const list = document.getElementById('gare-list');
  if (filtered.length === 0) {
    list.innerHTML = '<p class="empty" style="padding:20px;">Aucune gare trouvée.</p>';
    return;
  }
  list.innerHTML = filtered.map(g => {
    const done = state._existingNames && state._existingNames.has(KEY_PREFIX + g.nom);
    const meta = [g.ligne_flux, g.secteur_ug].filter(Boolean).join(' · ');
    return `<div class="gare-item ${done ? 'gare-done' : ''}" onclick="startVisite('${g.nom.replace(/'/g,"\\'")}')">
      <div>
        <div class="gare-item-name">${g.nom}</div>
        <div class="gare-item-meta">${meta || '—'}</div>
      </div>
    </div>`;
  }).join('');
}

/* ==========================================================================
   RENDER : VISITE FORM
   ========================================================================== */
async function startVisite(gareName) {
  const existing = await Store.get(KEY_PREFIX + gareName);
  if (existing) {
    state.currentVisite = JSON.parse(existing);
  } else {
    const gare = GARES.find(g => g.nom === gareName);
    state.currentVisite = {
      gare: gareName,
      gareInfo: gare,
      data: {},
      meta: {
        visiteur: '',
        date: today(),
        meteo: '',
        created: new Date().toISOString(),
        updated: new Date().toISOString()
      }
    };
    await saveCurrent();
  }
  renderForm();
}

async function openVisite(gareName) {
  const raw = await Store.get(KEY_PREFIX + gareName);
  if (raw) {
    state.currentVisite = JSON.parse(raw);
    if (!state.currentVisite.gareInfo) {
      state.currentVisite.gareInfo = GARES.find(g => g.nom === gareName);
    }
    renderForm();
  }
}

async function saveCurrent() {
  if (!state.currentVisite) return;
  state.currentVisite.meta.updated = new Date().toISOString();
  await Store.set(KEY_PREFIX + state.currentVisite.gare, state.currentVisite);
}

    <div id="sections-container">
      ${SECTIONS.map((s, idx) => renderSection(s, idx, v.data)).join('')}
    </div>
    <div class="bottom-bar">
      <button class="bar-save" onclick="manualSave()">💾 Sauvegarder</button>
      <button class="bar-export" onclick="exportCurrentCSV()">⇣ Exporter CSV</button>
    </div>
  `;
}

function renderSection(s, idx, data) {
  if (s.type === 'info') {
    return `
    <div class="section" id="sec-${s.id}">
      <button class="section-header" onclick="toggleSection('${s.id}')">
        <div class="section-num">01</div>
        <div class="section-title">${s.title}</div>
        <div class="section-chevron">▸</div>
      </button>
      <div class="section-body">
        <div class="info-field">
          <label class="info-label">Visiteur</label>
          <input class="info-input" type="text" value="${state.currentVisite.meta.visiteur || ''}"
                 onchange="updateMeta('visiteur', this.value)" placeholder="Tes initiales">
        </div>
        <div class="info-row">
          <div class="info-field">
            <label class="info-label">Date de visite</label>
            <input class="info-input" type="date" value="${state.currentVisite.meta.date || today()}"
                   onchange="updateMeta('date', this.value)">
          </div>
          <div class="info-field">
            <label class="info-label">Météo</label>
            <select class="info-input" onchange="updateMeta('meteo', this.value)">
              <option value="">—</option>
              <option ${state.currentVisite.meta.meteo==='soleil'?'selected':''} value="soleil">☀️ Soleil</option>
              <option ${state.currentVisite.meta.meteo==='nuageux'?'selected':''} value="nuageux">☁️ Nuageux</option>
              <option ${state.currentVisite.meta.meteo==='pluie'?'selected':''} value="pluie">🌧 Pluie</option>
              <option ${state.currentVisite.meta.meteo==='autre'?'selected':''} value="autre">Autre</option>
            </select>
          </div>
        </div>
      </div>
    </div>`;
  }
  const filledInSec = s.criteria.filter(c => c.scale !== 'text' && c.scale !== 'number' && data[c.id]?.val != null && data[c.id].val !== '').length;
  const totalInSec = s.criteria.filter(c => c.scale !== 'text' && c.scale !== 'number').length;
  const allDone = filledInSec === totalInSec && totalInSec > 0;
  return `
    <div class="section" id="sec-${s.id}">
      <button class="section-header" onclick="toggleSection('${s.id}')">
        <div class="section-num">${String(idx+1).padStart(2,'0')}</div>
        <div class="section-title">${s.title}</div>
        <div class="section-status ${allDone ? 'done' : ''}">${filledInSec}/${totalInSec}</div>
        <div class="section-chevron">▸</div>
      </button>
      <div class="section-body">
        ${s.criteria.map(c => renderCriterion(c, data)).join('')}
      </div>
    </div>`;
}

function renderCriterion(c, data) {
  const v = data[c.id] || {};
  if (c.scale === 'text') {
    return `<div class="criterion">
      <div class="criterion-label">${c.label}</div>
      <textarea class="criterion-note" placeholder="${c.placeholder || ''}"
                oninput="setCriterionText('${c.id}', this.value)">${v.val || ''}</textarea>
    </div>`;
  }
  if (c.scale === 'number') {
    return `<div class="criterion">
      <div class="criterion-label">${c.label}</div>
      <input class="info-input" type="number" value="${v.val || ''}"
             placeholder="${c.placeholder || ''}" 
             oninput="setCriterionText('${c.id}', this.value)"
             style="max-width:180px;">
    </div>`;
  }
  if (c.scale === 'choice') {
    return `<div class="criterion">
      <div class="criterion-label">${c.label}</div>
      <select class="info-input" onchange="setCriterionText('${c.id}', this.value)" style="width:100%;">
        <option value="">—</option>
        ${c.choices.map(ch => `<option ${v.val===ch?'selected':''} value="${ch}">${ch}</option>`).join('')}
      </select>
      ${renderNoteArea(c, v)}
    </div>`;
  }
  const n = c.scale;
  const vals = n === 2 ? [0,1] : n === 3 ? [0,0.5,1] : n === 4 ? [0,0.33,0.66,1] : [0,0.5,1];
  const labels = c.labels || vals.map(x => String(x));
  return `<div class="criterion ${v.note ? 'has-note' : ''}" id="crit-${c.id}">
    <div class="criterion-label">${c.label}</div>
    ${c.help ? `<div class="criterion-help">${c.help}</div>` : ''}
    <div class="rating cols-${n}">
      ${vals.map((val, i) => `
        <button class="rating-btn ${v.val === val ? 'active' : ''}" 
                data-val="${val}"
                onclick="setCriterion('${c.id}', ${val})">
          <div class="dot"></div>
          <div>${labels[i]}</div>
        </button>
      `).join('')}
    </div>
    <div class="extras-toggle" onclick="toggleExtras('${c.id}')">+ Note &amp; photo</div>
    <div class="criterion-extras">
      <textarea class="criterion-note" placeholder="Précision ou contexte…"
                oninput="setCriterionNote('${c.id}', this.value)">${v.note || ''}</textarea>
      <div class="photo-input-wrap">
        <label class="photo-btn">
          📷 ${v.photoCount ? `<span class="photo-count">${v.photoCount} photo(s)</span>` : 'Ajouter photo'}
          <input type="file" accept="image/*" capture="environment" multiple 
                 style="display:none;" onchange="handlePhoto('${c.id}', this)">
        </label>
      </div>
    </div>
  </div>`;
}

function renderNoteArea(c, v) {
  return `<textarea class="criterion-note" placeholder="Précision…" style="margin-top:8px;"
          oninput="setCriterionNote('${c.id}', this.value)">${v.note || ''}</textarea>`;
}

/* ==========================================================================
   FORM INTERACTIONS
   ========================================================================== */
function toggleSection(id) {
  const el = document.getElementById('sec-' + id);
  if (el) el.classList.toggle('open');
}

function toggleExtras(id) {
  const el = document.getElementById('crit-' + id);
  if (el) el.classList.toggle('force-extras');
}

async function setCriterion(id, val) {
  const v = state.currentVisite;
  if (!v.data[id]) v.data[id] = {};
  v.data[id].val = val;
  await saveCurrent();
  // Mise à jour UI minimale (ré-render la section au lieu de tout)
  refreshSectionStatus();
  // Màj boutons
  const btns = document.querySelectorAll(`#crit-${id} .rating-btn, [onclick*="setCriterion('${id}'"]`);
  const parent = document.getElementById('crit-' + id);
  if (parent) {
    parent.querySelectorAll('.rating-btn').forEach(b => {
      b.classList.toggle('active', parseFloat(b.dataset.val) === val);
    });
  }
}

async function setCriterionText(id, val) {
  const v = state.currentVisite;
  if (!v.data[id]) v.data[id] = {};
  v.data[id].val = val;
  await saveCurrent();
}

async function setCriterionNote(id, val) {
  const v = state.currentVisite;
  if (!v.data[id]) v.data[id] = {};
  v.data[id].note = val;
  await saveCurrent();
}

async function handlePhoto(id, input) {
  const files = input.files;
  if (!files.length) return;
  const v = state.currentVisite;
  if (!v.data[id]) v.data[id] = {};
  v.data[id].photoCount = (v.data[id].photoCount || 0) + files.length;
  // Note : on ne stocke PAS les photos ici (trop lourd). En prod → upload cloud.
  await saveCurrent();
  toast(`${files.length} photo(s) enregistrées (compteur uniquement)`, 'success');
  // refresh le compteur
  const countSpan = input.closest('.photo-btn').querySelector('.photo-count');
  if (countSpan) countSpan.textContent = `${v.data[id].photoCount} photo(s)`;
  else input.closest('.photo-btn').innerHTML = `📷 <span class="photo-count">${v.data[id].photoCount} photo(s)</span>` + input.outerHTML;
}

async function updateMeta(key, val) {
  state.currentVisite.meta[key] = val;
  await saveCurrent();
}

function refreshSectionStatus() {
  const v = state.currentVisite;
  SECTIONS.forEach((s, idx) => {
    if (!s.criteria) return;
    const filled = s.criteria.filter(c => c.scale !== 'text' && c.scale !== 'number' && v.data[c.id]?.val != null && v.data[c.id].val !== '').length;
    const total = s.criteria.filter(c => c.scale !== 'text' && c.scale !== 'number').length;
    const el = document.querySelector(`#sec-${s.id} .section-status`);
    if (el) {
      el.textContent = `${filled}/${total}`;
      el.classList.toggle('done', filled === total && total > 0);
    }
  });
  // Màj progress ring global
  const pct = progressPct(v.data);
  const ring = document.querySelector('.progress-ring-fg');
  if (ring) {
    ring.setAttribute('stroke-dashoffset', 2*Math.PI*17 * (1 - pct/100));
  }
  const lbl = document.querySelector('.progress-ring-label');
  if (lbl) lbl.textContent = pct + '%';
}

async function manualSave() {
  await saveCurrent();
  toast('Sauvegardé', 'success');
}

async function deleteVisite() {
  if (!state.currentVisite) return;
  if (!confirm(`Supprimer la visite de ${state.currentVisite.gare} ? Action irréversible.`)) return;
  await Store.delete(KEY_PREFIX + state.currentVisite.gare);
  state.currentVisite = null;
  toast('Visite supprimée');
  renderHome();
}

/* ==========================================================================
   NAVIGATION
   ========================================================================== */
function goToPicker() { renderPicker(); }

/* ==========================================================================
   EXPORTS
   ========================================================================== */
async function showExportMenu() {
  const modal = document.getElementById('modal');
  const content = document.getElementById('modal-content');
  const keys = await Store.list(KEY_PREFIX);
  content.innerHTML = `
    <h3 class="serif">Exporter</h3>
    <p>${keys.length} visite(s) en base. Choisis un format :</p>
    <button class="btn-primary" onclick="exportAllCSV()">📊 CSV toutes visites (compatible BASE_DONNEE)</button>
    <button class="btn-secondary" onclick="exportAllJSON()">🗂 JSON sauvegarde complète</button>
    <button class="btn-secondary" onclick="importJSON()">↥ Importer JSON (restauration)</button>
    <button class="btn-secondary" onclick="closeModal()" style="color:var(--taupe);">Fermer</button>
  `;
  modal.classList.add('show');
}
function closeModal() { document.getElementById('modal').classList.remove('show'); }

async function exportCurrentCSV() {
  if (!state.currentVisite) return;
  const rows = buildCSVRows([state.currentVisite]);
  downloadCSV(rows, `releve_${state.currentVisite.gare.replace(/\s+/g,'_')}.csv`);
  toast('CSV téléchargé', 'success');
}

async function exportAllCSV() {
  const keys = await Store.list(KEY_PREFIX);
  const visites = [];
  for (const k of keys) {
    const raw = await Store.get(k);
    if (raw) try { visites.push(JSON.parse(raw)); } catch(e) {}
  }
  if (!visites.length) return toast('Aucune visite à exporter', 'error');
  const rows = buildCSVRows(visites);
  downloadCSV(rows, `releves_SERM_HDF_${today()}.csv`);
  toast(`${visites.length} visite(s) exportée(s)`, 'success');
  closeModal();
}

function buildCSVRows(visites) {
  const headers = ['nom_gare', 'uic', 'axe', 'ligne_flux', 'secteur_ug', 'categorisation_projetee',
                   'visiteur', 'date_visite', 'meteo', 'progression_pct'];
  // Ajoute une colonne par critère
  SECTIONS.forEach(s => {
    if (!s.criteria) return;
    s.criteria.forEach(c => {
      headers.push(`${s.id}.${c.id}`);
      if (c.scale !== 'text' && c.scale !== 'number') {
        headers.push(`${s.id}.${c.id}.note`);
      }
    });
  });
  const rows = [headers];
  visites.forEach(v => {
    const row = [
      v.gare,
      v.gareInfo?.uic || '',
      v.gareInfo?.axe || '',
      v.gareInfo?.ligne_flux || '',
      v.gareInfo?.secteur_ug || '',
      v.gareInfo?.cat_pro || '',
      v.meta?.visiteur || '',
      v.meta?.date || '',
      v.meta?.meteo || '',
      progressPct(v.data)
    ];
    SECTIONS.forEach(s => {
      if (!s.criteria) return;
      s.criteria.forEach(c => {
        const d = v.data[c.id] || {};
        row.push(d.val != null ? d.val : '');
        if (c.scale !== 'text' && c.scale !== 'number') {
          row.push(d.note || '');
        }
      });
    });
    rows.push(row);
  });
  return rows;
}

function downloadCSV(rows, filename) {
  const csv = rows.map(r => r.map(c => {
    const s = String(c ?? '');
    return /[",;\n]/.test(s) ? `"${s.replace(/"/g,'""')}"` : s;
  }).join(';')).join('\n');
  const blob = new Blob(['\uFEFF' + csv], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = filename;
  a.click();
  URL.revokeObjectURL(a.href);
}

async function exportAllJSON() {
  const keys = await Store.list(KEY_PREFIX);
  const dump = {};
  for (const k of keys) dump[k] = await Store.get(k);
  const blob = new Blob([JSON.stringify(dump, null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = `sauvegarde_SERM_HDF_${today()}.json`;
  a.click();
  URL.revokeObjectURL(a.href);
  toast('Sauvegarde JSON téléchargée', 'success');
  closeModal();
}

function importJSON() {
  const input = document.createElement('input');
  input.type = 'file';
  input.accept = '.json';
  input.onchange = async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const text = await file.text();
    try {
      const dump = JSON.parse(text);
      let n = 0;
      for (const [k, v] of Object.entries(dump)) {
        if (k.startsWith(KEY_PREFIX)) { await Store.set(k, v); n++; }
      }
      toast(`${n} visite(s) importée(s)`, 'success');
      closeModal();
      renderHome();
    } catch(err) {
      toast('JSON invalide', 'error');
    }
  };
  input.click();
}

/* ==========================================================================
   BOOT
   ========================================================================== */
window.addEventListener('DOMContentLoaded', () => {
  renderHome();
});
</script>
</body>
